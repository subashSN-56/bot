<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .chat-container {
      width: 100%;
      max-width: 600px;
      margin: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px;
      text-align: center;
      background: #1e293b;
      font-weight: bold;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
    }

    .typing {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">🤖 AI Chatbot</div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-box">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById("chatBox");
  const input = document.getElementById("messageInput");

  const userId = "user12345 "; // static user

  function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    // typing indicator
    const typing = document.createElement("div");
    typing.classList.add("typing");
    typing.innerText = "Bot is typing...";
    chatBox.appendChild(typing);

    try {
      const res = await fetch("http://localhost:5000/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId,
          message
        })
      });

      const data = await res.json();

      chatBox.removeChild(typing);
      addMessage(data.reply, "bot");

    } catch (error) {
      chatBox.removeChild(typing);
      addMessage("❌ Error connecting to server", "bot");
    }
  }

  // Enter key support
  input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      sendMessage();
    }
  });
</script>

</body>
</html>
